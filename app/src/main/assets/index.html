<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USSD WebView</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 16px; background: #f9f9f9; }
        h1 { color: #333; }
        select, input[type=text], button { padding: 10px; margin: 5px 0; width: 100%; }
        #ussdResult, #ussdMenu { margin-top: 15px; padding: 10px; background: #fff; border: 1px solid #ccc; min-height: 40px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <h1>USSD WebView</h1>

    <label for="simSelect">Select SIM:</label>
    <select id="simSelect"></select>

    <label for="ussdCode">USSD Code:</label>
    <input type="text" id="ussdCode" placeholder="e.g., *123#">

    <button onclick="runUSSD()">Run USSD</button>

    <div id="ussdMenu" class="hidden"></div>
    <input type="text" id="ussdInput" placeholder="Type your response" class="hidden">
    <button id="sendInputBtn" class="hidden" onclick="sendUSSDInput()">Send Input</button>

    <div id="ussdResult"></div>

    <script>
        const simSelect = document.getElementById('simSelect');
        const ussdCodeInput = document.getElementById('ussdCode');
        const ussdResult = document.getElementById('ussdResult');
        const ussdMenu = document.getElementById('ussdMenu');
        const ussdInput = document.getElementById('ussdInput');
        const sendInputBtn = document.getElementById('sendInputBtn');

        // Load SIMs from Android
        function loadSimCards(sims) {
            simSelect.innerHTML = '';
            sims.forEach(sim => {
                const option = document.createElement('option');
                option.value = sim.slot;
                option.textContent = sim.name + ' (Slot ' + sim.slot + ')';
                simSelect.appendChild(option);
            });

            // Auto-select if only one SIM
            if (sims.length === 1) simSelect.selectedIndex = 0;
        }

        // Run USSD
        function runUSSD() {
            const code = ussdCodeInput.value.trim();
            const simSlot = parseInt(simSelect.value);
            if (!code) return alert('Enter USSD code');

            ussdResult.textContent = '';
            ussdMenu.classList.add('hidden');
            ussdInput.classList.add('hidden');
            sendInputBtn.classList.add('hidden');

            if (window.AndroidUSSD && AndroidUSSD.runUssd) {
                AndroidUSSD.runUssd(code, simSlot);
            }
        }

        // Show USSD response menu
        function showUssdMenu(message) {
            ussdMenu.textContent = message;
            ussdMenu.classList.remove('hidden');
            ussdInput.classList.remove('hidden');
            sendInputBtn.classList.remove('hidden');
        }

        // Send next step input
        function sendUSSDInput() {
            const input = ussdInput.value.trim();
            if (!input) return alert('Enter your response');

            if (window.AndroidUSSD && AndroidUSSD.sendUssdInput) {
                AndroidUSSD.sendUssdInput(input);
            }

            ussdInput.value = '';
        }

        // Show general results
        function showResult(message) {
            ussdResult.textContent = message;
        }

        // Request SIM info on page load
        window.onload = () => {
            if (window.AndroidUSSD && AndroidUSSD.getAvailableSims) {
                AndroidUSSD.getAvailableSims();
            }
        }
    </script>
</body>
</html>
